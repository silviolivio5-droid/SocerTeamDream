<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulatore di Calcio</title>
    <link rel="manifest" href="/manifest.json">
    <script src="scripts.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Simulatore di Calcio</h1>
    </header>

    <main id="app">
        <div id="home">
            <form>
                <label for="teamName">Nome Squadra Proproia:</label>
                <input type="text" id="teamName" name="teamName"><br><br>

                <label for="opponentTeamName">Nome Squadra Avversaria:</label>
                <input type="text" id="opponentTeamName" name="opponentTeamName"><br><br>

                <button type="button" onclick="startGame()">Gioca</button>
            </form>
        </div>

        <div id="gameScreen" style="display: none;">
            <h2>Partita in Corso...</h2>
            <p id="matchComment"></p>
            <ul id="goalsList"></ul>
            <button onclick="endGame()">Fine Partita</button>
        </div>

        <div id="resultScreen" style="display: none;">
            <h2>Risultato della Partita:</h2>
            <p id="finalResult"></p>
            <button onclick="goBackToHome()">Torna alla Home</button>
        </div>
    </main>
</body>
</html>
