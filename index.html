<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulatore Calcistica Sandbox</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .field {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 80%;
            margin: 0 auto;
            padding: 2rem;
            border: 1px solid #ccc;
            position: relative;
        }
        .player {
            background-color: #f00;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
        }
        .goal-animation {
            animation: goalAnimation 3s forwards;
        }
        @keyframes goalAnimation {
            from { background-color: #ff0; transform: scale(1); }
            to { background-color: #f00; transform: scale(2); opacity: 0.5; }
        }
    </style>
</head>
<body class="bg-gray-100 text-center p-4">
    <h1 class="text-3xl mb-4">Simulatore Calcistica Sandbox</h1>

    <!-- Home Page -->
    <div id="home" class="mb-8">
        <button onclick="startGame()" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-700">Partita Singola</button>
        <button disabled class="px-4 py-2 bg-gray-300 text-gray-600 rounded ml-4">Torneo</button>
        <button disabled class="px-4 py-2 bg-gray-300 text-gray-600 rounded ml-4">Amichevole</button>
    </div>

    <!-- Game Page -->
    <div id="game" hidden class="mb-8">
        <h2 class="text-xl mb-4">Crea la tua Squadra</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div id="team1" class="bg-white p-4 shadow-lg rounded">
                <h3>Squadra Giocatore</h3>
                <input type="text" id="team1Name" placeholder="Nome Squadra">
                <input type="url" id="team1Logo" placeholder="URL Logo">
                <div class="flex flex-wrap justify-center mb-4">
                    <!-- Player Slots -->
                    <button onclick="addPlayer(1, 'team1')" class="player rounded-full w-8 h-8 mr-2">1</button>
                    <button onclick="addPlayer(2, 'team1')" class="player rounded-full w-8 h-8 mr-2">2</button>
                    <button onclick="addPlayer(3, 'team1')" class="player rounded-full w-8 h-8 mr-2">3</button>
                    <button onclick="addPlayer(4, 'team1')" class="player rounded-full w-8 h-8 mr-2">4</button>
                    <button onclick="addPlayer(5, 'team1')" class="player rounded-full w-8 h-8 mr-2">5</button>
                    <button onclick="addPlayer(6, 'team1')" class="player rounded-full w-8 h-8 mr-2">6</button>
                    <button onclick="addPlayer(7, 'team1')" class="player rounded-full w-8 h-8 mr-2">7</button>
                    <button onclick="addPlayer(8, 'team1')" class="player rounded-full w-8 h-8 mr-2">8</button>
                    <button onclick="addPlayer(9, 'team1')" class="player rounded-full w-8 h-8 mr-2">9</button>
                    <button onclick="addPlayer(10, 'team1')" class="player rounded-full w-8 h-8 mr-2">10</button>
                    <button onclick="addPlayer(11, 'team1')" class="player rounded-full w-8 h-8 mr-2">11</button>
                </div>
            </div>
            <div id="team2" class="bg-white p-4 shadow-lg rounded">
                <h3>Squadra Avversaria</h3>
                <input type="text" id="team2Name" placeholder="Nome Squadra">
                <input type="url" id="team2Logo" placeholder="URL Logo">
                <div class="flex flex-wrap justify-center mb-4">
                    <!-- Player Slots -->
                    <button onclick="addPlayer(1, 'team2')" class="player rounded-full w-8 h-8 mr-2">1</button>
                    <button onclick="addPlayer(2, 'team2')" class="player rounded-full w-8 h-8 mr-2">2</button>
                    <button onclick="addPlayer(3, 'team2')" class="player rounded-full w-8 h-8 mr-2">3</button>
                    <button onclick="addPlayer(4, 'team2')" class="player rounded-full w-8 h-8 mr-2">4</button>
                    <button onclick="addPlayer(5, 'team2')" class="player rounded-full w-8 h-8 mr-2">5</button>
                    <button onclick="addPlayer(6, 'team2')" class="player rounded-full w-8 h-8 mr-2">6</button>
                    <button onclick="addPlayer(7, 'team2')" class="player rounded-full w-8 h-8 mr-2">7</button>
                    <button onclick="addPlayer(8, 'team2')" class="player rounded-full w-8 h-8 mr-2">8</button>
                    <button onclick="addPlayer(9, 'team2')" class="player rounded-full w-8 h-8 mr-2">9</button>
                    <button onclick="addPlayer(10, 'team2')" class="player rounded-full w-8 h-8 mr-2">10</button>
                    <button onclick="addPlayer(11, 'team2')" class="player rounded-full w-8 h-8 mr-2">11</button>
                </div>
            </div>
        </div>
        <button id="startMatch" hidden class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-700">Inizia Partita</button>
    </div>

    <!-- Match Page -->
    <div id="match" hidden class="mb-8">
        <h2 class="text-xl mb-4">Cronaca della Partita</h2>
        <div id="matchLog" class="bg-white p-4 shadow-lg rounded h-60 overflow-y-auto"></div>
        <button id="endMatch" hidden class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-700 mt-4">Fine Partita</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
